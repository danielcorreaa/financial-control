spring.application.name=financial-control

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=financial_control
spring.data.mongodb.username=${DB_USERNAME:root}
spring.data.mongodb.password=${DB_PASSWORD:example}
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.auto-index-creation=true

# Server
server.port=8080

# JWT
security.jwt.secret=${JWT_SECRET:3f8a2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
