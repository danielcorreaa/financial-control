spring.application.name=financial-control

# MongoDB
# Em produção: defina MONGODB_URI com a connection string do Atlas
# Ex: mongodb+srv://user:pass@cluster.mongodb.net/financial_control?retryWrites=true&w=majority
# Em desenvolvimento: usa host/port/credenciais locais como fallback
spring.data.mongodb.uri=${MONGODB_URI:mongodb://root:example@localhost:27017/financial_control?authSource=admin}
spring.data.mongodb.auto-index-creation=true

# Server
server.port=${PORT:8080}

# JWT
security.jwt.secret=${JWT_SECRET:3f8a2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS — origens permitidas separadas por vírgula
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# URL do frontend (usada no redirect após OAuth2)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2 — defina as variáveis de ambiente para ativar
# GOOGLE_CLIENT_ID=seu-client-id
# GOOGLE_CLIENT_SECRET=seu-client-secret
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Multipart (PDF upload)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
